<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG Foods - లాగిన్ / సైన్అప్</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2b6cb0; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2b6cb0; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2c5282; }
    </style>
</head>
<body>
<div class="auth-card">
    <h2>🍔 NG Foods కి స్వాగతం</h2>
    <input type="text" id="username" placeholder="యూజర్ నేమ్ (Name)" value="Naveen">
    <input type="password" id="password" placeholder="పాస్‌వర్డ్" value="123456">
    <button onclick="handleLogin()">లాగిన్ అవ్వండి</button>
</div>
<script>
    function handleLogin() {
        const user = document.getElementById("username").value;
        if(user.trim() !== "") {
            // లాగిన్ అయిన యూజర్ పేరును బ్రౌజర్ మెమరీలో సేవ్ చేస్తున్నాం
            localStorage.setItem("loggedInUser", user);
            // డైరెక్ట్ గా మెయిన్ మెనూ (index.html) కి పంపుతున్నాం
            window.location.href = "index.html";
        } else {
            alert("దయచేసి సరైన వివరాలు ఇవ్వండి!");
        }
    }
</script>
</body>
</html>
