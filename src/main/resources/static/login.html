<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG Foods - లాగిన్</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f7fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #1a365d; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #2b6cb0; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #2b4c7e; }
        .switch-page { text-align: center; margin-top: 15px; font-size: 14px; color: #718096; }
        .switch-page a { color: #2b6cb0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>NG Foods లాగిన్</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>మొబైల్ నంబర్ / ఈమెయిల్</label>
            <input type="text" id="username" placeholder="ఎంటర్ చేయండి" required>
        </div>
        <div class="form-group">
            <label>పాస్‌వర్డ్</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit">లాగిన్ అవ్వండి</button>
    </form>
    <div class="switch-page">
        కొత్త అకౌంట్ కావాలా? <a href="signup.html">ఇక్కడ సైన్అప్ అవ్వండి</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // నీ లైవ్ రెండర్ బ్యాక్-ఎండ్ లాగిన్ API కి కనెక్ట్ చేస్తున్నాం
        fetch('https://food-application-backend-1.onrender.com/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile: username, password: password }) // username ని mobile కింద పంపుతున్నాం
        })
        .then(response => {
            if(response.ok) {
                alert('లాగిన్ విజయవంతమైంది! 🎉');
                window.location.href = 'index.html'; // సక్సెస్ అయితే మెయిన్ పేజీకి వెళ్తుంది
            } else {
                alert('తప్పుడు వివరాలు! దయచేసి మళ్లీ ప్రయత్నించండి.');
            }
        })
        .catch(err => alert('సర్వర్ కనెక్ట్ అవ్వడంలో సమస్య ఉంది!'));
    });
</script>
</body>
</html>
