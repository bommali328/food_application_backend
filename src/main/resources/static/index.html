<!DOCTYPE html>
<html lang="te">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NG Foods - ఆర్డర్ నౌ</title>
	<style>
		body {
			font-family: 'Segoe UI', Arial, sans-serif;
			background-color: #f7fafc;
			margin: 0;
			padding: 20px;
			color: #2d3748;
		}

		.container {
			max-width: 600px;
			margin: 0 auto;
			background: white;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
		}

		h2 {
			color: #1a365d;
			text-align: center;
			margin-bottom: 25px;
			border-bottom: 2px solid #2b6cb0;
			padding-bottom: 10px;
		}

		.section {
			margin-bottom: 20px;
			padding-bottom: 15px;
			border-bottom: 1px solid #e2e8f0;
		}

		h3 {
			color: #2b6cb0;
			margin-bottom: 10px;
		}

		.form-group {
			margin-bottom: 15px;
		}

		label {
			display: block;
			margin-bottom: 5px;
			font-weight: bold;
			font-size: 14px;
		}

		input[type="text"],
		input[type="tel"] {
			width: 100%;
			padding: 10px;
			border: 1px solid #e2e8f0;
			border-radius: 4px;
			box-sizing: border-box;
		}

		.radio-group {
			display: flex;
			gap: 20px;
			margin-top: 8px;
		}

		.radio-option {
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
			font-weight: bold;
		}

		.order-summary {
			background-color: #ebf8ff;
			padding: 15px;
			border-radius: 6px;
			margin-top: 15px;
		}

		.total-price {
			font-size: 18px;
			font-weight: bold;
			color: #2b6cb0;
			text-align: right;
			margin-top: 10px;
		}

		.btn-submit {
			width: 100%;
			padding: 12px;
			background-color: #48bb78;
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
			margin-top: 15px;
			transition: background 0.2s;
		}

		.btn-submit:hover {
			background-color: #38a169;
		}
	</style>
</head>

<body>

	<div class="container">
		<h2>NG Foods Checkout</h2>

		<!-- 1. కస్టమర్ వివరాలు -->
		<div class="section">
			<h3>👤 కస్టమర్ వివరాలు</h3>
			<div class="form-group">
				<label for="customerName">పూర్తి పేరు</label>
				<input type="text" id="customerName" value="Naveen" placeholder="నీ పేరు ఎంటర్ చేయి" required>
			</div>
			<div class="form-group">
				<label for="customerMobile">మొబైల్ నంబర్</label>
				<input type="tel" id="customerMobile" value="9876543210" placeholder="10 అంకెల మొబైల్ నంబర్"
					pattern="[0-9]{10}" required>
			</div>
		</div>

		<!-- 2. ఆర్డర్ సమ్మరీ -->
		<div class="section">
			<h3>📦 ఆర్డర్ సమ్మరీ</h3>
			<div class="order-summary">
				<p>• చికెన్ బిరియానీ (Family Pack) x 1</p>
				<p>• స్పెషల్ చికెన్ ఫ్రై x 1</p>
				<div class="total-price">మొత్తం బిల్లు: ₹1330/-</div>
			</div>
		</div>

		<!-- 3. పేమెంట్ మోడ్ -->
		<div class="section">
			<h3>💳 పేమెంట్ విధానం ఎంచుకోండి</h3>
			<div class="radio-group">
				<label class="radio-option">
					<input type="radio" name="paymentMode" value="ONLINE" checked>
					📱 ఆన్‌లైన్ పేమెంట్ (PhonePe/UPI)
				</label>
				<label class="radio-option">
					<input type="radio" name="paymentMode" value="COD">
					💵 క్యాష్ ఆన్ డెలివరీ (COD)
				</label>
			</div>
		</div>

		<!-- ఆర్డర్ బటన్ -->
		<button class="btn-submit" onclick="placeCustomerOrder()">ఆర్డర్ ఖరారు చేయండి (Place Order)</button>
	</div>

	<script>
		window.cartTotal = 1330;

		function placeCustomerOrder() {
			const customerName = document.getElementById("customerName").value;
			const customerMobile = document.getElementById("customerMobile").value;
			const totalAmount = window.cartTotal;

			const selectedPaymentMode = document.querySelector('input[name="paymentMode"]:checked').value;

			if (!customerMobile || customerMobile.length !== 10) {
				alert("దయచేసి సరైన 10 అంకెల మొబైల్ నంబర్ ఎంటర్ చేయండి!");
				return;
			}

			if (selectedPaymentMode === "ONLINE") {

				// 🔄 నీ ఒరిజినల్ ఫోన్‌పే యూపీఐ ఐడి ని ఇక్కడ పక్కాగా అప్‌డేట్ చేశాను బ్రదర్
				const myUpiId = "nbommali52@ybl";
				const businessName = "NG Foods";

				// యూపీఐ డీప్‌లింక్ URL
				const upiUrl = `upi://pay?pa=${myUpiId}&pn=${encodeURIComponent(businessName)}&am=${totalAmount}&cu=INR&tn=${encodeURIComponent("NGFoods Order")}`;

				alert("మిమ్మల్ని PhonePe / UPI యాప్‌కి రీడైరెక్ట్ చేస్తున్నాము. పేమెంట్ పూర్తయ్యాక బ్రౌజర్‌కి తిరిగి రండి!");

				window.location.href = upiUrl;

				// 3 సెకన్లు ఆగి బ్యాక్-ఎండ్ డేటాబేస్ కి పంపుతుంది
				setTimeout(() => {
					saveOrderToBackend(customerName, customerMobile, totalAmount, "ONLINE", "COMPLETED");
				}, 3000);

			} else {
				saveOrderToBackend(customerName, customerMobile, totalAmount, "COD", "PENDING");
			}
		}

		function saveOrderToBackend(name, mobile, total, payMode, payStatus) {
			const txnId = payMode === "ONLINE" ? "TXN" + Math.floor(100000 + Math.random() * 900000) : "N/A";

			const orderData = {
				customerName: name,
				customerMobile: mobile,
				totalAmount: total,
				paymentMode: payMode,
				paymentStatus: payStatus,
				transactionId: txnId
			};

			console.log("Sending Database Payload:", orderData);

			// నీ లైవ్ రెండర్ సర్వర్ యుఆర్ఎల్
			fetch('https://food-application-backend-1.onrender.com/api/orders', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify(orderData)
			})
				.then(response => {
					if (!response.ok) {
						throw new Error('డేటాబేస్ లో ఆర్డర్ సేవ్ అవ్వలేదు!');
					}
					return response.json();
				})
				.then(savedOrder => {
					alert(`NG Foods: ఆర్డర్ విజయవంతంగా ప్లేస్ అయింది! 🎉`);
					window.location.href = `https://food-application-backend-1.onrender.com/track.html?id=${savedOrder.id}`;
				})
				.catch(error => {
					console.error('Error:', error);
					alert('సర్వర్ కనెక్ట్ అవ్వలేదు! కానీ పేమెంట్ ఇనిషియేట్ అయింది.');
				});
		}
	</script>
</body>

</html>
