<!DOCTYPE html>
<html lang="te">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NG Foods - మెనూ & ఆర్డర్</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f7fafc;
			padding: 20px;
			color: #2d3748;
		}

		.container {
			max-width: 600px;
			margin: 0 auto;
			background: white;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
		}

		h2,
		h3 {
			color: #2b6cb0;
			text-align: center;
		}

		.item-row {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 10px 0;
			border-bottom: 1px solid #e2e8f0;
		}

		.btn-qty {
			padding: 5px 10px;
			background: #e2e8f0;
			border: none;
			cursor: pointer;
			font-weight: bold;
		}

		input[type="text"],
		textarea {
			width: 100%;
			padding: 10px;
			margin-top: 5px;
			border: 1px solid #e2e8f0;
			border-radius: 4px;
			box-sizing: border-box;
		}

		.radio-group {
			display: flex;
			gap: 20px;
			margin: 15px 0;
			font-weight: bold;
		}

		.btn-submit {
			width: 100%;
			padding: 12px;
			background-color: #48bb78;
			color: white;
			border: none;
			border-radius: 6px;
			font-size: 16px;
			font-weight: bold;
			cursor: pointer;
		}
	</style>
</head>

<body>
	<div class="container">
		<h2>🍗 NG Foods మెనూ</h2>
		<p style="text-align: right;">హలో, <strong id="userGreeting">యూజర్</strong>!</p>

		<!-- ఫుడ్ ఐటమ్స్ -->
		<div class="item-row">
			<span>చికెన్ బిరియానీ (₹350)</span>
			<div>
				<button class="btn-qty" onclick="updateQty('biryani', -1)">-</button>
				<span id="qty-biryani">1</span>
				<button class="btn-qty" onclick="updateQty('biryani', 1)">+</button>
			</div>
		</div>
		<div class="item-row">
			<span>స్పెషల్ చికెన్ ఫ్రై (₹280)</span>
			<div>
				<button class="btn-qty" onclick="updateQty('fry', -1)">-</button>
				<span id="qty-fry">1</span>
				<button class="btn-qty" onclick="updateQty('fry', 1)">+</button>
			</div>
		</div>

		<h3 style="text-align: right; margin-top: 20px;">మొత్తం బిల్లు: ₹<span id="totalDisplay">630</span>/-</h3>

		<!-- డెలివరీ అడ్రస్ -->
		<div style="margin-top: 20px;">
			<label>🏠 <strong>డెలివరీ అడ్రస్ ఎంటర్ చేయి నవీన్:</strong></label>
			<textarea id="deliveryAddress" rows="3" placeholder="డోర్ నంబర్, స్ట్రీట్, ఏరియా..."
				required>Hyderabad</textarea>
		</div>

		<!-- పేమెంట్ ఆప్షన్స్ -->
		<div class="radio-group">
			<label><input type="radio" name="paymentMode" value="ONLINE" checked> 📱 PhonePe / UPI</label>
			<label><input type="radio" name="paymentMode" value="COD"> 💵 COD</label>
		</div>

		<button class="btn-submit" onclick="processOrder()">ఆర్డర్ ఖరారు చేయండి (Place Order)</button>
	</div>

	<script>
		// లాగిన్ అయిన పేరు చూపించడం
		const currentCustomer = localStorage.getItem("loggedInUser") || "Naveen";
		document.getElementById("userGreeting").innerText = currentCustomer;

		let prices = {biryani: 350, fry: 280};
		let qtys = {biryani: 1, fry: 1};

		function updateQty(item, change) {
			if (qtys[item] + change >= 0) {
				qtys[item] += change;
				document.getElementById(`qty-${item}`).innerText = qtys[item];
				calculateTotal();
			}
		}

		let globalTotal = 630;
		function calculateTotal() {
			globalTotal = (qtys.biryani * prices.biryani) + (qtys.fry * prices.fry);
			document.getElementById("totalDisplay").innerText = globalTotal;
		}

		function processOrder() {
			const address = document.getElementById("deliveryAddress").value;
			const mode = document.querySelector('input[name="paymentMode"]:checked').value;

			if (!address.trim()) {
				alert("దయచేసి అడ్రస్ ఎంటర్ చేయండి!");
				return;
			}

			const itemsSummary = `Biryani x${qtys.biryani}, Fry x${qtys.fry}`;

			if (mode === "ONLINE") {
				const myUpiId = "nbommali52@ybl";
				const upiUrl = `upi://pay?pa=${myUpiId}&pn=NGFoods&am=${globalTotal}&cu=INR&tn=Order`;

				// 1. ముందు ఫోన్ పే ఓపెన్ అవుతుంది
				window.location.href = upiUrl;

				// 2. 3 సెకన్ల తర్వాత బ్యాక్ ఎండ్ లో డేటా సేవ్ అవుతుంది
				setTimeout(() => {
					sendDataToBackend(currentCustomer, address, itemsSummary, globalTotal, "ONLINE", "COMPLETED");
				}, 3000);
			} else {
				sendDataToBackend(currentCustomer, address, itemsSummary, globalTotal, "COD", "PENDING");
			}
		}

		function sendDataToBackend(name, addr, items, total, payMode, payStatus) {
			const txnId = payMode === "ONLINE" ? "TXN" + Math.floor(100000 + Math.random() * 900000) : "N/A";

			const payload = {
				customerName: name,
				customerMobile: "9876543210", // డెమో నంబర్
				address: addr,
				orderDetails: items,
				totalAmount: total,
				paymentMode: payMode,
				paymentStatus: payStatus,
				transactionId: txnId
			};

			fetch('https://food-application-backend-1.onrender.com/api/orders', {
				method: 'POST',
				headers: {'Content-Type': 'application/json'},
				body: JSON.stringify(payload)
			})
				.then(res => res.json())
				.then(saved => {
					alert("ఆర్డర్ విజయవంతంగా సేవ్ అయింది! 🎉");

					// 3. చివరగా వాట్సాప్ నోటిఫికేషన్ వెళ్తుంది
					const whatsappNumber = "919876543210";
					const message = `New Order #${saved.id}\n👤 User: ${name}\n🏠 Address: ${addr}\n📦 Items: ${items}\n💰 Total: ₹${total}/-\n📊 Status: ${payStatus}`;
					window.location.href = `https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(message)}`;
				});
		}
	</script>
</body>

</html>
