<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NG Foods - సైన్అప్</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f7fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { color: #2b6cb0; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #2b6cb0; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #2b4c7e; }
        .switch-page { text-align: center; margin-top: 15px; font-size: 14px; color: #718096; }
        .switch-page a { color: #2b6cb0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>కొత్త అకౌంట్ క్రియేషన్</h2>
    <form id="signupForm">
        <div class="form-group">
            <label>పూర్తి పేరు</label>
            <input type="text" id="fullName" placeholder="నీ పేరు" required>
        </div>
        <div class="form-group">
            <label>మొబైల్ నంబర్</label>
            <input type="tel" id="mobileNumber" placeholder="98765XXXXX" pattern="[0-9]{10}" required>
        </div>
        <div class="form-group">
            <label>పాస్‌వర్డ్ క్రియేట్ చేయండి</label>
            <input type="password" id="newPassword" placeholder="••••••••" required>
        </div>
        <button type="submit">రిజిస్టర్ అవ్వండి</button>
    </form>
    <div class="switch-page">
        అల్రెడీ అకౌంట్ ఉందా? <a href="login.html">ఇక్కడ లాగిన్ అవ్వండి</a>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('fullName').value;
        const mobile = document.getElementById('mobileNumber').value;
        const password = document.getElementById('newPassword').value;

        // నీ లైవ్ రెండర్ బ్యాక్-ఎండ్ సైన్అప్ API కి డేటా పంపుతున్నాం
        fetch('https://food-application-backend-1.onrender.com/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name, mobile: mobile, password: password })
        })
        .then(response => {
            if(response.ok) {
                alert('రిజిస్ట్రేషన్ సక్సెస్ అయింది! 🎉 ఇప్పుడు లాగిన్ అవ్వండి.');
                window.location.href = 'login.html';
            } else {
                alert('రిజిస్ట్రేషన్ ఫెయిల్ అయింది. మొబైల్ నంబర్ చెక్ చేయండి.');
            }
        })
        .catch(err => alert('సర్వర్ కనెక్ట్ అవ్వడంలో సమస్య ఉంది!'));
    });
</script>
</body>
</html>
