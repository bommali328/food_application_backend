<!DOCTYPE html>
<html lang="te">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NG Foods - ఓనర్ డ్యాష్‌బోర్డ్</title>
	<style>
		body {
			font-family: 'Segoe UI', Arial, sans-serif;
			background-color: #f7fafc;
			margin: 0;
			padding: 20px;
		}

		.dashboard-container {
			max-width: 1200px;
			margin: 0 auto;
			background: white;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
		}

		h2 {
			color: #1a365d;
			text-align: center;
			border-bottom: 3px solid #2b6cb0;
			padding-bottom: 10px;
			margin-bottom: 30px;
		}

		.refresh-btn {
			background-color: #2b6cb0;
			color: white;
			padding: 10px 20px;
			border: none;
			border-radius: 5px;
			font-weight: bold;
			cursor: pointer;
			float: right;
			margin-bottom: 15px;
		}

		.refresh-btn:hover {
			background-color: #2c5282;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
			font-size: 14px;
		}

		th,
		td {
			border: 1px solid #e2e8f0;
			padding: 12px;
			text-align: left;
		}

		th {
			background-color: #2b6cb0;
			color: white;
		}

		tr:nth-child(even) {
			background-color: #f7fafc;
		}

		.status-completed {
			background-color: #c6f6d5;
			color: #22543d;
			padding: 4px 8px;
			border-radius: 4px;
			font-weight: bold;
		}

		.status-pending {
			background-color: #feebc8;
			color: #744210;
			padding: 4px 8px;
			border-radius: 4px;
			font-weight: bold;
		}

		.badge-online {
			background-color: #ebf8ff;
			color: #2b6cb0;
			padding: 2px 6px;
			border-radius: 4px;
			font-weight: bold;
		}

		.badge-cod {
			background-color: #edf2f7;
			color: #4a5568;
			padding: 2px 6px;
			border-radius: 4px;
			font-weight: bold;
		}
	</style>
</head>

<body>

	<div class="dashboard-container">
		<button class="refresh-btn" onclick="loadAllOrders()">🔄 ఆర్డర్స్ రిఫ్రెష్</button>
		<h2>🍔 NG Foods - ఓనర్ ఆర్డర్స్ మేనేజ్‌మెంట్ డ్యాష్‌బోర్డ్</h2>

		<table id="ordersTable">
			<thead>
				<tr>
					<th>ఆర్డర్ ID</th>
					<th>కస్టమర్ వివరాలు</th>
					<th>డెలివరీ అడ్రస్</th>
					<th>ఆర్డర్ ఐటమ్స్</th>
					<th>మొత్తం బిల్లు</th>
					<th>పేమెంట్ మోడ్</th>
					<th>UPI ట్రాన్సాక్షన్ ID</th>
					<th>పేమెంట్ స్టేటస్</th>
				</tr>
			</thead>
			<tbody id="ordersList">
				<!-- డేటాబేస్ నుండి వచ్చే ఆర్డర్లు ఇక్కడ లోడ్ అవుతాయి -->
			</tbody>
		</table>
	</div>

	<script>
		// పేజీ ఓపెన్ అవ్వగానే ఆర్డర్లన్నీ లోడ్ అవ్వడానికి
		document.addEventListener("DOMContentLoaded", loadAllOrders);

		function loadAllOrders() {
			const ordersList = document.getElementById("ordersList");
			ordersList.innerHTML = "<tr><td colspan='8' style='text-align:center;'>ఆర్డర్స్ లోడ్ అవుతున్నాయి...</td></tr>";

			// నీ లైవ్ రెండర్ సర్వర్ URL నుండి డేటా తెచ్చుకుంటుంది
			fetch('https://food-application-backend-1.onrender.com/api/orders/all')
				.then(response => response.json())
				.then(orders => {
					ordersList.innerHTML = ""; // క్లియర్ చేయడం

					if (orders.length === 0) {
						ordersList.innerHTML = "<tr><td colspan='8' style='text-align:center;'>ప్రస్తుతానికి ఎలాంటి ఆర్డర్లు లేవు!</td></tr>";
						return;
					}

					// ఆర్డర్లను రివర్స్ లో చూపిస్తాం (కొత్త ఆర్డర్ పైన కనిపిస్తుంది)
					orders.reverse().forEach(order => {
						const tr = document.createElement("tr");

						// పేమెంట్ స్టేటస్ కి కలర్ క్లాస్ డిసైడ్ చేయడం
						const statusClass = order.paymentStatus === "COMPLETED" ? "status-completed" : "status-pending";
						// పేమెంట్ మోడ్ బ్యాడ్జ్
						const modeClass = order.paymentMode === "ONLINE" ? "badge-online" : "badge-cod";

						tr.innerHTML = `
                    <td><strong>#${order.id}</strong></td>
                    <td>
                        <strong>${order.customerName}</strong><br>
                        <span style="color:#718096;">📞 ${order.customerMobile}</span>
                    </td>
                    <td>${order.address || 'N/A'}</td>
                    <td>${order.orderDetails || 'చికెన్ బిరియానీ కాంబో'}</td>
                    <td><strong style="color:#2b6cb0;">₹${order.totalAmount}/-</strong></td>
                    <td><span class="${modeClass}">${order.paymentMode}</span></td>
                    <td style="font-family:monospace; color:#4a5568;">${order.transactionId || 'N/A'}</td>
                    <td><span class="${statusClass}">${order.paymentStatus}</span></td>
                `;
						ordersList.appendChild(tr);
					});
				})
				.catch(error => {
					console.error('Error fetching orders:', error);
					ordersList.innerHTML = "<tr><td colspan='8' style='text-align:center; color:red;'>డేటా లోడ్ చేయడంలో లోపం జరిగింది!</td></tr>";
				});
		}
	</script>
</body>

</html>
