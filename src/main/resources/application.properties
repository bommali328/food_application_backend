# =====================================================================
# 🌐 SPRING APPLICATION CONFIG
# =====================================================================
spring.application.name=ng-food-backend

# =====================================================================
# 🐘 RENDER POSTGRESQL LIVE DATABASE CONNECTION (DIRECT)
# =====================================================================
# ఇక్కడ మనం నేరుగా రెండర్ క్లౌడ్ డేటాబేస్ URL మరియు యూజర్ డీటెయిల్స్ ఇచ్చేస్తున్నాం
spring.datasource.url=jdbc:postgresql://dpg-cub99al2ngec73f8h8e0-a.singapore-postgres.render.com/fooddb?sslmode=require
spring.datasource.username=fooddb_user
spring.datasource.password=SecurePassword123

# =====================================================================
# ⚙️ HIBERNATE & JPA CONFIGURATION (POSTGRESQL DIALECT)
# =====================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Connection Pool Settings
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000